name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install Capacitor 5.7.8
        run: npm install @capacitor/core@5.7.8 @capacitor/cli@5.7.8 @capacitor/android@5.7.8 --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons
        run: |
          npm install @capacitor/assets --legacy-peer-deps
          npx capacitor-assets generate --android

      - name: Fix Gradle & Java compatibility
        run: |
          cd android
          sed -i 's|gradle-.*-all.zip|gradle-8.2.1-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          echo "" >> app/build.gradle
          echo "android.compileOptions.sourceCompatibility = JavaVersion.VERSION_17" >> app/build.gradle
          echo "android.compileOptions.targetCompatibility = JavaVersion.VERSION_17" >> app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KyokoApp-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
