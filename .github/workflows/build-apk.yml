name: Build KyokoApp APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor 5
        run: npm install @capacitor/core@5.7.8 @capacitor/cli@5.7.8 @capacitor/android@5.7.8 --legacy-peer-deps

      - name: Install Capacitor plugins
        run: |
          npm install @capacitor/filesystem@5 --legacy-peer-deps
          npm install @codetrix-studio/capacitor-google-auth --legacy-peer-deps

      - name: Build Vite
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Configure Android (permissions & native setup)
        run: node scripts/configure-android.cjs

      - name: Inject Google Auth client ID
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if grep -q "server_client_id" "$STRINGS_FILE"; then
            echo "server_client_id already exists"
          else
            sed -i 's|</resources>|    <string name="server_client_id">730376199922-8hj9gq2ifvkc6ag6ddfs6qsgi84i6tq7.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_FILE"
            echo "✅ Injected server_client_id"
          fi

      - name: Inject app icon
        run: |
          if [ -f "assets/icon/ic_launcher.png" ]; then
            pip install Pillow --quiet --break-system-packages
            python3 scripts/gen_icons.py
            echo "✅ Icons generated"
          else
            echo "⚠️ No icon found at assets/icon/ic_launcher.png, skip"
          fi

      - name: Fix Gradle & Java compatibility
        run: |
          cd android
          sed -i 's|gradle-.*-all.zip|gradle-8.2.1-all.zip|g' gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Release Signing (auto-generate JKS, no manual keystore needed) ───────
      - name: Generate release keystore
        run: |
          mkdir -p android/app/keystore
          keytool -genkeypair \
            -alias kyokoapp \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -keystore android/app/keystore/kyokoapp-release.keystore \
            -storepass kyokoapp123 \
            -keypass kyokoapp123 \
            -dname "CN=KyokoApp,O=Kyoko,C=ID" \
            -noprompt
          echo "✅ Keystore generated (JKS)"

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=kyokoapp123
          keyPassword=kyokoapp123
          keyAlias=kyokoapp
          storeFile=keystore/kyokoapp-release.keystore
          EOF

      - name: Inject signing config into build.gradle
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          sed -i '/^android {/i\
          def keystorePropertiesFile = rootProject.file("key.properties")\
          def keystoreProperties = new Properties()\
          keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\
          ' "$BUILD_GRADLE"
          sed -i '/buildTypes {/i\
              signingConfigs {\
                  release {\
                      keyAlias keystoreProperties["keyAlias"]\
                      keyPassword keystoreProperties["keyPassword"]\
                      storeFile file(keystoreProperties["storeFile"])\
                      storePassword keystoreProperties["storePassword"]\
                  }\
              }\
          ' "$BUILD_GRADLE"
          sed -i '/buildTypes {/,/^    }/ s/release {/release {\n                signingConfig signingConfigs.release/' "$BUILD_GRADLE"
          echo "✅ Signing config injected"

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk KyokoApp.apk

      # ── Versioning & Release ─────────────────────────────────────────────────
      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Update version.json
        run: |
          cat > version.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "apkUrl": "https://github.com/KyokoApp/KyokoApp/releases/latest/download/KyokoApp.apk",
            "changelog": "Update v${{ steps.version.outputs.VERSION }} — Fitur & perbaikan terbaru"
          }
          EOF
          echo "✅ version.json updated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: KyokoApp v${{ steps.version.outputs.VERSION }}
          files: |
            KyokoApp.apk
            version.json
          token: ${{ secrets.PAT_TOKEN }}
          make_latest: true
