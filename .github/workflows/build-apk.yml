name: Build KyokoBeat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Configure Android (permissions & native plugin)
        run: node scripts/configure-android.cjs

      - name: Inject app icon
        run: |
          if [ ! -f "assets/icon/ic_launcher.png" ]; then
            echo "⚠️ Icon tidak ditemukan di assets/icon/ic_launcher.png, skip."
          else
            echo "✅ Icon ditemukan, generate semua ukuran..."
            pip install Pillow --quiet --break-system-packages
            python3 scripts/gen_icons.py
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup release keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/kyokobeat-release.keystore
          echo "✅ Keystore loaded"

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=kyokobeat123
          keyPassword=kyokobeat123
          keyAlias=kyokobeat
          storeFile=keystore/kyokobeat-release.keystore
          EOF

      - name: Inject signing config into build.gradle
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          sed -i '/^android {/i\
          def keystorePropertiesFile = rootProject.file("key.properties")\
          def keystoreProperties = new Properties()\
          keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\
          ' "$BUILD_GRADLE"
          sed -i '/buildTypes {/i\
              signingConfigs {\
                  release {\
                      keyAlias keystoreProperties["keyAlias"]\
                      keyPassword keystoreProperties["keyPassword"]\
                      storeFile file(keystoreProperties["storeFile"])\
                      storePassword keystoreProperties["storePassword"]\
                  }\
              }\
          ' "$BUILD_GRADLE"
          sed -i '/buildTypes {/,/^    }/ s/release {/release {\n                signingConfig signingConfigs.release/' "$BUILD_GRADLE"
          echo "✅ Signing config injected"

      - name: Build APK release
        run: cd android && ./gradlew assembleRelease

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk KyokoBeat.apk

      # ── Ambil versi dari package.json ──
      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # ── Update version.json dengan versi & URL terbaru ──
      - name: Update version.json
        run: |
          cat > version.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "apkUrl": "https://github.com/KyokoApp/KyokoBeat/releases/latest/download/KyokoBeat.apk",
            "changelog": "Update v${{ steps.version.outputs.VERSION }}"
          }
          EOF

      # ── Upload ke GitHub Releases ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: KyokoBeat v${{ steps.version.outputs.VERSION }}
          files: |
            KyokoBeat.apk
            version.json
          token: ${{ secrets.PAT_TOKEN }}
          make_latest: true
