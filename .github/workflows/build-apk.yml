name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor 5.7.8
        run: npm install @capacitor/core@5.7.8 @capacitor/cli@5.7.8 @capacitor/android@5.7.8 --legacy-peer-deps

      - name: Install Google Auth plugin
        run: npm install @codetrix-studio/capacitor-google-auth --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.DEBUG_KEYSTORE }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore
            echo "Keystore loaded from secrets"
          else
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "New keystore generated"
            echo "Copy this base64 to GitHub Secrets as DEBUG_KEYSTORE:"
            base64 ~/.android/debug.keystore
          fi

      - name: Print SHA-1
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android

      - name: Generate app icons
        run: |
          mkdir -p assets
          cp public/icon.png assets/icon.png
          npm install @capacitor/assets --legacy-peer-deps
          npx capacitor-assets generate --android

      - name: Fix Gradle & Java compatibility
        run: |
          cd android
          sed -i 's|gradle-.*-all.zip|gradle-8.2.1-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          echo "" >> app/build.gradle
          echo "android.compileOptions.sourceCompatibility = JavaVersion.VERSION_17" >> app/build.gradle
          echo "android.compileOptions.targetCompatibility = JavaVersion.VERSION_17" >> app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject Google Auth client ID into strings.xml
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if grep -q "server_client_id" "$STRINGS_FILE"; then
            echo "server_client_id already exists"
          else
            sed -i 's|</resources>|    <string name="server_client_id">730376199922-8hj9gq2ifvkc6ag6ddfs6qsgi84i6tq7.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_FILE"
            echo "Injected server_client_id"
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KyokoApp-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
