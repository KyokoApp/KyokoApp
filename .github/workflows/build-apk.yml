name: Build KyokoBeat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      generate_keystore:
        description: 'Generate NEW keystore (download artifact keystore_base64.txt lalu paste ke secret KEYSTORE_BASE64)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Configure Android (permissions & native plugin)
        run: node scripts/configure-android.cjs

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate new keystore & save to file
        if: ${{ github.event.inputs.generate_keystore == 'true' }}
        run: |
          mkdir -p ~/.android /tmp/keystore-out
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=KyokoBeat, O=Kyoko, C=ID"
          base64 -w 0 ~/.android/debug.keystore > /tmp/keystore-out/keystore_base64.txt
          echo "Keystore generated. Download artifact lalu paste isinya ke secret KEYSTORE_BASE64"

      - name: Upload keystore base64 as artifact
        if: ${{ github.event.inputs.generate_keystore == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: /tmp/keystore-out/keystore_base64.txt
          retention-days: 1

      - name: Inject persistent debug keystore
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore
            echo "✅ Keystore loaded from secret KEYSTORE_BASE64"
          else
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=KyokoBeat, O=Kyoko, C=ID"
            echo "⚠️ WARNING: Secret KEYSTORE_BASE64 tidak ditemukan, keystore baru di-generate!"
            echo "Setiap build akan beda signature sampai secret di-set."
          fi

      - name: Build APK debug
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KyokoBeat-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
