name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor 5.7.8
        run: npm install @capacitor/core@5.7.8 @capacitor/cli@5.7.8 @capacitor/android@5.7.8 --legacy-peer-deps

      - name: Install Google Auth plugin
        run: npm install @codetrix-studio/capacitor-google-auth --legacy-peer-deps

      - name: Install Capacitor Filesystem plugin
        run: npm install @capacitor/filesystem --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.DEBUG_KEYSTORE }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore
            echo "Keystore loaded from secrets"
          else
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "New keystore generated"
            echo "Copy this base64 to GitHub Secrets as DEBUG_KEYSTORE:"
            base64 ~/.android/debug.keystore
          fi

      - name: Print SHA-1
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android

      - name: Generate app icons
        run: |
          mkdir -p assets
          cp public/icon.png assets/icon.png
          npm install @capacitor/assets --legacy-peer-deps
          npx capacitor-assets generate --android

      - name: Fix Gradle & Java compatibility
        run: |
          cd android
          sed -i 's|gradle-.*-all.zip|gradle-8.2.1-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          echo "" >> app/build.gradle
          echo "android.compileOptions.sourceCompatibility = JavaVersion.VERSION_17" >> app/build.gradle
          echo "android.compileOptions.targetCompatibility = JavaVersion.VERSION_17" >> app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch MainActivity - Enable WebView iframe & mixed content
        run: |
          # Cari path MainActivity (bisa .java atau .kt)
          MAIN_JAVA="android/app/src/main/java/com/kyokoapp/app/MainActivity.java"
          MAIN_KT="android/app/src/main/java/com/kyokoapp/app/MainActivity.kt"

          if [ -f "$MAIN_KT" ]; then
            cat > "$MAIN_KT" << 'EOF'
          package com.kyokoapp.app

          import android.os.Bundle
          import android.webkit.WebSettings
          import android.webkit.WebView
          import com.getcapacitor.BridgeActivity

          class MainActivity : BridgeActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)
              val webView: WebView = bridge.webView
              val settings: WebSettings = webView.settings
              settings.mixedContentMode = WebSettings.MIXED_CONTENT_ALWAYS_ALLOW
              settings.domStorageEnabled = true
              settings.javaScriptEnabled = true
              settings.allowUniversalAccessFromFileURLs = true
              settings.allowFileAccessFromFileURLs = true
              settings.mediaPlaybackRequiresUserGesture = false
              WebView.setWebContentsDebuggingEnabled(true)
            }
          }
          EOF
            echo "Patched MainActivity.kt"
          else
            cat > "$MAIN_JAVA" << 'EOF'
          package com.kyokoapp.app;

          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              WebView webView = getBridge().getWebView();
              WebSettings settings = webView.getSettings();
              settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              settings.setDomStorageEnabled(true);
              settings.setJavaScriptEnabled(true);
              settings.setAllowUniversalAccessFromFileURLs(true);
              settings.setAllowFileAccessFromFileURLs(true);
              settings.setMediaPlaybackRequiresUserGesture(false);
              WebView.setWebContentsDebuggingEnabled(true);
            }
          }
          EOF
            echo "Patched MainActivity.java"
          fi

      - name: Patch AndroidManifest - Allow cleartext & hardware acceleration
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Tambah usesCleartextTraffic dan hardwareAccelerated jika belum ada
          if ! grep -q "usesCleartextTraffic" "$MANIFEST"; then
            sed -i 's|android:label="@string/app_name"|android:label="@string/app_name"\n        android:usesCleartextTraffic="true"\n        android:hardwareAccelerated="true"|g' "$MANIFEST"
            echo "Patched AndroidManifest.xml"
          else
            echo "AndroidManifest already patched"
          fi

      - name: Patch AndroidManifest - Add media permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "READ_MEDIA_AUDIO" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />|g' "$MANIFEST"
            echo "Added media permissions"
          else
            echo "Media permissions already exist"
          fi

      - name: Inject Google Auth client ID into strings.xml
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if grep -q "server_client_id" "$STRINGS_FILE"; then
            echo "server_client_id already exists"
          else
            sed -i 's|</resources>|    <string name="server_client_id">730376199922-8hj9gq2ifvkc6ag6ddfs6qsgi84i6tq7.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_FILE"
            echo "Injected server_client_id"
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KyokoApp-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

